app:
  name: "Huobao Drama API"
  version: "1.0.0"
  debug: true
  language: "zh" # 系统语言：zh(中文) 或 en(英文)

server:
  port: 5678
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3012"
  read_timeout: 600
  write_timeout: 600

database:
  type: "sqlite"
  path: "./data/huobao_drama.db"
  max_idle: 10
  max_open: 100

storage:
  type: "local"
  local_path: "./data/storage"
  base_url: "http://localhost:5678/static"

# 前端工作台「跳过视频合成」请在设置页切换，或构建时设置环境变量：
# NUXT_PUBLIC_SKIP_VIDEO_COMPOSE=true
# （本文件仅为说明，后端当前不读取该项）
pipeline:
  skip_video_compose: false

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"
